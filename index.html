<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Happy Birthday 💖</title>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T7V6CPYLKE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-T7V6CPYLKE');
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="icon" href="assets/cake.png">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body style="display: none;">
    <canvas id="bgFX"></canvas>
    <canvas id="confetti"></canvas>

    <audio id="bgMusic" preload="metadata" loop>
        <source src="assets/musica.mp3" type="audio/mpeg">
    </audio>


    <main class="stage">
        <section class="card">
            <header class="topbar">
                <div class="topbarRow">
                    <div class="badge">
                        <span>🎁</span>
                        <span>Cartão especial</span>
                    </div>

                    <div class="topActions">
                        <button id="logoutBtn" class="logoutBtn" type="button">🚪Sair</button>

                        <button class="musicBtn" id="musicBtn" type="button">
                            <span id="musicIcon">🎵</span>
                            <span id="musicText">Play Music</span>
                        </button>
                    </div>
                </div>

                <div class="dots" id="dots"></div>
            </header>

            <section class="frame">
                <div class="flipBook" id="flipBook">
                    <article class="page" id="pageContent"></article>
                </div>
            </section>
        </section>
    </main>

    <section class="final" id="final">
        <div class="finalCard">
            <h2> Feliz aniversário de novo 🤍</h2>
            <p>
                Agora tem uma parte Física... que só posso te entregar pessoalmente.
                Como é difícil ver a senhorita, precisamos combinar essa entrega!
            </p>
            <button id="restart" type="button">Rever 💖</button>
        </div>
    </section>

    <script src="js/confetti.js"></script>
    <script type="module" src="js/script.js"></script>
</body>

</html>
